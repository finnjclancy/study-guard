<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Study Guard — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #ddd;
      font-family: Arial, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container { width: 100%; max-width: 560px; }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #ff3300;
      text-transform: uppercase;
    }

    header .badge {
      font-size: 11px;
      background: #1a1a1a;
      color: #555;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    section { margin-bottom: 36px; }

    .section-title {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 12px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 16px;
    }

    /* Redirect URL */
    .redirect-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="url"] {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #eee;
      padding: 9px 12px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="url"]:focus { border-color: #ff3300; }

    button {
      background: #ff3300;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      padding: 9px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    button:hover { background: #cc2200; }

    button.secondary {
      background: #222;
      color: #888;
    }
    button.secondary:hover { background: #2a2a2a; color: #ccc; }

    /* Whitelist */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    ul.site-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    ul.site-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: #bbb;
      font-family: monospace;
    }

    ul.site-list li .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      margin-right: 10px;
      flex-shrink: 0;
    }

    ul.site-list li span { flex: 1; }

    ul.site-list li button.remove {
      background: none;
      color: #333;
      font-size: 16px;
      padding: 0 4px;
      font-weight: bold;
    }
    ul.site-list li button.remove:hover { color: #ff3300; background: none; }

    .empty { color: #333; font-size: 12px; text-align: center; padding: 20px; }

    .saved-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2ecc71;
      color: #000;
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 10px 24px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .saved-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .reset-row { margin-top: 12px; text-align: right; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛡 Study Guard</h1>
      <span class="badge">SETTINGS</span>
    </header>

    <section>
      <div class="section-title">Redirect destination</div>
      <div class="card">
        <div class="redirect-row">
          <input type="url" id="redirectInput" placeholder="https://…" />
          <button id="saveRedirect">Save</button>
        </div>
      </div>
    </section>

    <section>
      <div class="section-title">Allowed sites (whitelist)</div>
      <div class="card">
        <div class="add-row">
          <input type="text" id="siteInput" placeholder="e.g. reddit.com" />
          <button id="addBtn">Add</button>
        </div>
        <ul class="site-list" id="siteList"></ul>
        <div class="reset-row">
          <button class="secondary" id="resetBtn">Reset to defaults</button>
        </div>
      </div>
    </section>
  </div>

  <div class="saved-toast" id="toast">Saved</div>

  <script src="options.js"></script>
</body>
</html>
